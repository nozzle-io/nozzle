name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      # Integration tests require Metal/GPU — may fail on headless CI
      - name: Integration tests
        run: ./build/tests/nozzle_integration_tests --reporter compact || true

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Unit tests
        run: ./build/tests/Debug/nozzle_tests.exe --reporter compact

      # Integration tests require D3D11/GPU — may fail on headless CI
      - name: Integration tests
        run: ./build/tests/Debug/nozzle_integration_tests.exe --reporter compact || true

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      # Integration tests require DMA-BUF/GPU — may fail on headless CI
      - name: Integration tests
        run: ./build/tests/nozzle_integration_tests --reporter compact || true
