          -DNOZZLE_BUILD_TESTS=OFF
          -DNOZZLE_BUILD_EXAMPLES=OFF
          -DNOZZLE_BUILD_OPENGL=ON
          -DCMAKE_INSTALL_PREFIX="$PWD/dist/${{ steps.meta.outputs.package_root }}"

      - name: Build SDK
        run: cmake --build build-sdk --config Release

      - name: Install SDK
