              NozzleSenderDesc desc = {0};
              uint32_t flags = 0;
              return nozzle_resolve_fallback_flags(&desc, &flags) == NOZZLE_OK ? 0 : 1;
          }
          SMOKE_C
          cat > smoke-src/CMakeLists.txt <<'SMOKE_CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(nozzle_sdk_smoke C CXX)
          set(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreaded$<$<CONFIG:Debug>:Debug>")
          find_package(nozzle CONFIG REQUIRED)
          add_executable(nozzle_sdk_smoke main.c)
          set_target_properties(nozzle_sdk_smoke PROPERTIES LINKER_LANGUAGE CXX)
          target_link_libraries(nozzle_sdk_smoke PRIVATE nozzle::nozzle)
          SMOKE_CMAKE
          cmake -S smoke-src -B smoke-build -DCMAKE_PREFIX_PATH="$PWD/smoke-extract/${{ steps.meta.outputs.package_root }}"
          cmake --build smoke-build --config Release
          ./smoke-build/Release/nozzle_sdk_smoke.exe

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: dist/${{ steps.meta.outputs.package_name }}

  publish-sdk-release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - package-sdk-macos
      - package-sdk-linux
      - package-sdk-windows
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect SDK archives
        id: collect
        shell: bash
        run: |
          find release-assets -type f -name 'nozzle-sdk-*.zip' | sort > sdk-zips.txt
          cat sdk-zips.txt
          count=$(wc -l < sdk-zips.txt | tr -d ' ')
          if [ "$count" -ne 3 ]; then
            echo "expected 3 SDK archives, found $count" >&2
            exit 1
          fi

      - name: Delete old latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete latest --yes --repo "${GITHUB_REPOSITORY}"
          else
            echo "No existing latest release to delete"
          fi

      - name: Check versioned release assets do not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' > existing-assets.txt 2>/dev/null; then
            while IFS= read -r archive; do
              asset="$(basename "$archive")"
              if grep -Fx "$asset" existing-assets.txt; then
                echo "versioned release asset already exists: $asset" >&2
                exit 1
              fi
            done < sdk-zips.txt
          else
            echo "No existing release for ${GITHUB_REF_NAME}; create step will create it."
          fi

      - name: Create or update SDK release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t archives < sdk-zips.txt
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            gh release create latest "${archives[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Latest development snapshot" \
              --prerelease \
              --notes "Development SDK snapshot from main. Commit: ${GITHUB_SHA}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release upload "${GITHUB_REF_NAME}" "${archives[@]}" --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "${GITHUB_REF_NAME}" "${archives[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${GITHUB_REF_NAME}" \
                --notes "Release ${GITHUB_REF_NAME}"
            fi
          else
            echo "unsupported release ref: ${GITHUB_REF}" >&2
            exit 1
          fi
