name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      - name: Integration tests
        run: ./build/tests/nozzle_integration_tests --reporter compact

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Unit tests
        run: ./build/tests/Debug/nozzle_tests.exe --reporter compact

      - name: Integration tests
        run: ./build/tests/Debug/nozzle_integration_tests.exe --reporter compact
