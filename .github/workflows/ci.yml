        run: |
          archive="dist/${{ steps.meta.outputs.package_name }}"
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/include/nozzle/nozzle.hpp'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/include/nozzle/nozzle_c.h'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/lib/nozzle.lib'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/lib/cmake/nozzle/nozzleConfig.cmake'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/LICENSE'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/README-SDK.md'

      - name: Smoke test extracted SDK
        shell: bash
        run: |
          rm -rf smoke-extract smoke-build smoke-src
          mkdir -p smoke-extract smoke-src
          (cd smoke-extract && cmake -E tar xf "../dist/${{ steps.meta.outputs.package_name }}")
          cat > smoke-src/main.c <<'SMOKE_C'
          #include <stdint.h>
          #include <nozzle/nozzle_c.h>
