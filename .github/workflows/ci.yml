name: CI

on:
  push:
    branches: [main, stable]
    tags: ['v*']
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  check-no-exceptions:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check exception policy
        run: bash scripts/check_no_exceptions.sh .

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DNOZZLE_ENABLE_TEST_HOOKS=ON

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      - name: C API tests
        run: ./build/tests/nozzle_c_api_tests --reporter compact

      # Integration tests must SKIP unsupported runner capabilities, not hide failures.
      - name: Integration tests
        run: ./build/tests/nozzle_integration_tests --reporter compact

      # Explicit evidence for #56 RGB semantic -> storage fallback receiver metadata.
      - name: RGB semantic receiver metadata tests
        run: ./build/tests/nozzle_integration_tests "[integration][fallback][rgb_semantic]" --reporter console --success --allow-running-no-tests

      # Explicit evidence for #82 Metal IOSurface alias runtime coverage.
      # --allow-running-no-tests keeps runner capability skips visible in the log
      # without turning an unsupported macOS runner into a false test failure.
      - name: Metal IOSurface alias runtime tests
        run: ./build/tests/nozzle_integration_tests "[metal][direct_publish][native_format]" --reporter compact --success --allow-running-no-tests

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DNOZZLE_ENABLE_TEST_HOOKS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Unit tests
        run: ./build/tests/Debug/nozzle_tests.exe --reporter compact

      - name: C API tests
        run: ./build/tests/Debug/nozzle_c_api_tests.exe --reporter compact

      # Integration tests must SKIP unsupported runner capabilities, not hide failures.
      - name: Integration tests
        run: ./build/tests/Debug/nozzle_integration_tests.exe --reporter compact

      # Explicit evidence for #56 RGB semantic -> storage fallback receiver metadata.
      - name: RGB semantic receiver metadata tests
        run: ./build/tests/Debug/nozzle_integration_tests.exe "[integration][fallback][rgb_semantic]" --reporter console --success --allow-running-no-tests

      # D3D11 native injection tests — gating, must pass
      - name: D3D11 native injection tests
        run: ./build/tests/Debug/nozzle_integration_tests.exe "[d3d11][native_device]" --reporter compact

  build-windows-strict:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DNOZZLE_STRICT_NO_EXCEPTIONS=ON -DNOZZLE_ENABLE_TEST_HOOKS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Unit tests
        run: ./build/tests/Debug/nozzle_tests.exe --reporter compact

  build-linux-strict:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

      - name: Configure
        run: cmake -B build -DNOZZLE_STRICT_NO_EXCEPTIONS=ON -DNOZZLE_ENABLE_TEST_HOOKS=ON

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      - name: C API tests
        run: ./build/tests/nozzle_c_api_tests --reporter compact

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

      - name: Configure
        run: cmake -B build -DNOZZLE_ENABLE_TEST_HOOKS=ON

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      - name: C API tests
        run: ./build/tests/nozzle_c_api_tests --reporter compact

      # Integration tests must SKIP unsupported runner capabilities, not hide failures.
      - name: Integration tests
        run: ./build/tests/nozzle_integration_tests --reporter compact

  build-linux-production-default:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Unit tests
        run: ./build/tests/nozzle_tests --reporter compact

      - name: C API tests
        run: ./build/tests/nozzle_c_api_tests --reporter compact

  package-sdk-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare SDK metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          platform="macos-universal-static"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="nozzle-sdk-${GITHUB_REF_NAME}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="nozzle-sdk-latest-${short_sha}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="nozzle-sdk-stable-${short_sha}-${platform}"
          else
            base="nozzle-sdk-ci-${short_sha}-${platform}"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"

      - name: Configure SDK
        run: >-
          cmake -B build-sdk
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DNOZZLE_BUILD_TESTS=OFF
          -DNOZZLE_BUILD_EXAMPLES=OFF
          -DNOZZLE_BUILD_OPENGL=ON
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DCMAKE_INSTALL_PREFIX="$PWD/dist/${{ steps.meta.outputs.package_root }}"

      - name: Build SDK
        run: cmake --build build-sdk --config Release

      - name: Install SDK
        run: cmake --install build-sdk --config Release

      - name: Verify macOS CMake export portability
        shell: bash
        run: |
          cmake_dir="dist/${{ steps.meta.outputs.package_root }}/lib/cmake/nozzle"
          if grep -R -E 'MacOSX\.sdk|/Library/Developer/CommandLineTools|/Applications/Xcode' "$cmake_dir"; then
            echo "installed CMake package contains build-machine SDK paths" >&2
            exit 1
          fi
          grep -R -F 'LINKER:-framework,Metal' "$cmake_dir"
          grep -R -F 'LINKER:-framework,IOSurface' "$cmake_dir"
          grep -R -F 'LINKER:-framework,Foundation' "$cmake_dir"
          grep -R -F 'LINKER:-framework,Accelerate' "$cmake_dir"
          grep -R -F 'LINKER:-framework,OpenGL' "$cmake_dir"

      - name: Add SDK docs
        run: |
          cp LICENSE "dist/${{ steps.meta.outputs.package_root }}/LICENSE"
          cp README-SDK.md "dist/${{ steps.meta.outputs.package_root }}/README-SDK.md"

      - name: Create archive
        run: |
          cd dist
          cmake -E tar cf "${{ steps.meta.outputs.package_name }}" --format=zip "${{ steps.meta.outputs.package_root }}"

      - name: Verify archive contents
        shell: bash
        run: |
          archive="dist/${{ steps.meta.outputs.package_name }}"
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/include/nozzle/nozzle.hpp'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/include/nozzle/nozzle_c.h'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/lib/libnozzle.a'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/lib/cmake/nozzle/nozzleConfig.cmake'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/LICENSE'
          cmake -E tar tf "$archive" | grep -F '${{ steps.meta.outputs.package_root }}/README-SDK.md'

      - name: Smoke test extracted SDK
        shell: bash
        run: |
          rm -rf smoke-extract smoke-build smoke-src
          mkdir -p smoke-extract smoke-src
          (cd smoke-extract && cmake -E tar xf "../dist/${{ steps.meta.outputs.package_name }}")
          lipo -info "smoke-extract/${{ steps.meta.outputs.package_root }}/lib/libnozzle.a"
          cat > smoke-src/main.c <<'SMOKE_C'
          #include <stdint.h>
          #include <nozzle/nozzle_c.h>
          int main(void) {
              NozzleSenderDesc desc = {0};
              uint32_t flags = 0;
              return nozzle_resolve_fallback_flags(&desc, &flags) == NOZZLE_OK ? 0 : 1;
          }
          SMOKE_C
          cat > smoke-src/CMakeLists.txt <<'SMOKE_CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(nozzle_sdk_smoke C CXX)
          find_package(nozzle CONFIG REQUIRED)
          add_executable(nozzle_sdk_smoke main.c)
          set_target_properties(nozzle_sdk_smoke PROPERTIES LINKER_LANGUAGE CXX)
          target_link_libraries(nozzle_sdk_smoke PRIVATE nozzle::nozzle)
          SMOKE_CMAKE
          cmake -S smoke-src -B smoke-build -DCMAKE_PREFIX_PATH="$PWD/smoke-extract/${{ steps.meta.outputs.package_root }}"
          cmake --build smoke-build
          ./smoke-build/nozzle_sdk_smoke

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: dist/${{ steps.meta.outputs.package_name }}

  package-sdk-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

